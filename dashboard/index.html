<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentGate — Tool Approval Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --border-light: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --critical: #ff3b30;
      --high: #ff9500;
      --medium: #ffcc00;
      --low: #34c759;
      --approved: #30d158;
      --rejected: #ff3b30;
      --pending: #ff9f0a;
      --accent: #007aff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.2px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #ff3b30, #ff9500);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--approved);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── Stats bar ── */
    .stats-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 32px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-pending .stat-value { color: var(--pending); }
    .stat-approved .stat-value { color: var(--approved); }
    .stat-rejected .stat-value { color: var(--rejected); }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 24px;
    }

    /* ── Section ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    /* ── Request card ── */
    .requests-list {
      display: grid;
      gap: 12px;
    }
    .request-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      position: relative;
      transition: border-color 0.15s;
    }
    .request-card:hover { border-color: var(--border-light); }
    .request-card.critical { border-left: 3px solid var(--critical); }
    .request-card.high     { border-left: 3px solid var(--high); }
    .request-card.medium   { border-left: 3px solid var(--medium); }
    .request-card.low      { border-left: 3px solid var(--low); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .card-left { flex: 1; min-width: 0; }
    .tool-name {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .action-desc {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .risk-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .risk-badge.critical { background: rgba(255,59,48,.2); color: var(--critical); }
    .risk-badge.high     { background: rgba(255,149,0,.2); color: var(--high); }
    .risk-badge.medium   { background: rgba(255,204,0,.2); color: var(--medium); }
    .risk-badge.low      { background: rgba(52,199,89,.2); color: var(--low); }

    .context-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      margin: 8px 0 12px;
    }
    .ctx-item {
      font-size: 12px;
      color: var(--muted);
    }
    .ctx-key { opacity: 0.7; }
    .ctx-val { color: #aaa; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .waiting-since {
      font-size: 12px;
      color: var(--muted);
    }
    .waiting-since span { color: var(--pending); font-weight: 500; }

    .action-buttons {
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.1s, transform 0.05s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn-approve { background: var(--approved); color: #000; }
    .btn-reject  { background: var(--surface); color: var(--rejected); border: 1px solid var(--rejected); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* ── History table ── */
    .history-table {
      width: 100%;
      border-collapse: collapse;
    }
    .history-table th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .history-table td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: rgba(255,255,255,.02); }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .status-pill.approved { background: rgba(48,209,88,.15); color: var(--approved); }
    .status-pill.rejected { background: rgba(255,59,48,.15); color: var(--rejected); }
    .status-pill.expired  { background: rgba(100,100,100,.15); color: var(--muted); }
    .status-pill.pending  { background: rgba(255,159,10,.15); color: var(--pending); }

    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: #aaa; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty h3 { font-size: 15px; color: #aaa; margin-bottom: 6px; }

    /* ── Notification toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--approved); color: var(--approved); }
    #toast.error   { border-color: var(--rejected); color: var(--rejected); }

    /* ── No pending large state ── */
    .all-clear {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
    }
    .all-clear-icon { font-size: 40px; margin-bottom: 12px; }
    .all-clear h3 { font-size: 16px; margin-bottom: 6px; color: var(--approved); }
    .all-clear p { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    AgentGate
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span id="refresh-status">Live — refreshing every 5s</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat stat-pending">
    <div class="stat-value" id="stat-pending">—</div>
    <div class="stat-label">Pending</div>
  </div>
  <div class="stat stat-approved">
    <div class="stat-value" id="stat-approved">—</div>
    <div class="stat-label">Approved</div>
  </div>
  <div class="stat stat-rejected">
    <div class="stat-value" id="stat-rejected">—</div>
    <div class="stat-label">Rejected</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="stat-rate" style="color:var(--text)">—</div>
    <div class="stat-label">Approval rate</div>
  </div>
</div>

<main>
  <!-- Pending requests -->
  <div>
    <div class="section-header">
      <div class="section-title">⏳ Awaiting Approval</div>
    </div>
    <div id="pending-list" class="requests-list">
      <div class="all-clear"><div class="all-clear-icon">⏳</div><p>Loading...</p></div>
    </div>
  </div>

  <!-- History -->
  <div>
    <div class="section-header">
      <div class="section-title">📋 Decision History</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
      <table class="history-table">
        <thead>
          <tr>
            <th>Tool</th>
            <th>Action</th>
            <th>Risk</th>
            <th>Status</th>
            <th>Note</th>
            <th>Decided</th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px;">Loading history...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://beseparjuerxjygszlta.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlc2VwYXJqdWVyeGp5Z3N6bHRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODY2OTYsImV4cCI6MjA5Njk2MjY5Nn0.olesTppkswAP5360f2A5Qn9w5pRHTPt0POGfqKtfI3Y';

async function sbFetch(path, method = 'GET', body = null) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'return=representation',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return null;
  return res.json();
}

function relTime(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m ago`;
}

function fmtCtx(ctx) {
  if (!ctx || typeof ctx !== 'object') return '';
  return Object.entries(ctx).slice(0, 5).map(([k, v]) => {
    const val = typeof v === 'number' ? v.toLocaleString() : String(v);
    return `<span class="ctx-item"><span class="ctx-key">${k}:</span> <span class="ctx-val">${val}</span></span>`;
  }).join('');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => { t.className = ''; }, 3000);
}

async function decide(id, status) {
  const note = status === 'rejected'
    ? (prompt('Rejection reason (optional):') || '')
    : '';
  const btns = document.querySelectorAll(`[data-id="${id}"]`);
  btns.forEach(b => b.disabled = true);

  try {
    await sbFetch(`gate_requests?id=eq.${id}`, 'PATCH', {
      status,
      decided_at: new Date().toISOString(),
      decision_note: note || (status === 'approved' ? 'Approved via dashboard' : 'Rejected via dashboard'),
    });
    showToast(status === 'approved' ? '✓ Approved — agent may proceed' : '✗ Rejected — agent blocked', status === 'approved' ? 'success' : 'error');
    setTimeout(refresh, 400);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    btns.forEach(b => b.disabled = false);
  }
}

async function refresh() {
  try {
    const all = await sbFetch('gate_requests?order=requested_at.desc&select=*&limit=100');
    if (!all) return;

    const pending  = all.filter(r => r.status === 'pending');
    const decided  = all.filter(r => r.status !== 'pending');
    const approved = all.filter(r => r.status === 'approved').length;
    const rejected = all.filter(r => r.status === 'rejected').length;
    const total    = approved + rejected;

    // Stats
    document.getElementById('stat-pending').textContent  = pending.length;
    document.getElementById('stat-approved').textContent = approved;
    document.getElementById('stat-rejected').textContent = rejected;
    document.getElementById('stat-rate').textContent     = total ? Math.round(approved / total * 100) + '%' : '—';

    // Pending list
    const pl = document.getElementById('pending-list');
    if (pending.length === 0) {
      pl.innerHTML = `<div class="all-clear">
        <div class="all-clear-icon">✅</div>
        <h3>All clear</h3>
        <p>No pending approvals. The agent is waiting for requests.</p>
      </div>`;
    } else {
      pl.innerHTML = pending.map(r => `
        <div class="request-card ${r.risk_level}">
          <div class="card-top">
            <div class="card-left">
              <div class="tool-name">${r.tool_name}</div>
              <div class="action-desc">${r.action_description}</div>
            </div>
            <span class="risk-badge ${r.risk_level}">${r.risk_level}</span>
          </div>
          <div class="context-grid">${fmtCtx(r.context)}</div>
          <div class="card-footer">
            <div class="waiting-since">Waiting <span>${relTime(r.requested_at)}</span></div>
            <div class="action-buttons">
              <button class="btn btn-reject" data-id="${r.id}" onclick="decide('${r.id}','rejected')">Reject</button>
              <button class="btn btn-approve" data-id="${r.id}" onclick="decide('${r.id}','approved')">Approve</button>
            </div>
          </div>
        </div>`).join('');
    }

    // History
    const hb = document.getElementById('history-body');
    const hist = decided.slice(0, 20);
    if (hist.length === 0) {
      hb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px;">No decisions yet</td></tr>';
    } else {
      hb.innerHTML = hist.map(r => `
        <tr>
          <td class="mono">${r.tool_name}</td>
          <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.action_description}</td>
          <td><span class="risk-badge ${r.risk_level}" style="font-size:10px;">${r.risk_level}</span></td>
          <td><span class="status-pill ${r.status}">${r.status}</span></td>
          <td style="color:var(--muted);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;">${r.decision_note || '—'}</td>
          <td style="color:var(--muted);font-size:12px;white-space:nowrap;">${r.decided_at ? relTime(r.decided_at) : '—'}</td>
        </tr>`).join('');
    }
  } catch (err) {
    document.getElementById('refresh-status').textContent = `Error: ${err.message}`;
  }
}

// Boot + auto-refresh
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
